services:
  - type: web
    name: amman-bakes-pos
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: amman-bakes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: DB_SYNC
        value: alter

databases:
  - name: amman-bakes-db
    plan: free
    databaseName: amman_bakes
    user: amman_bakes
